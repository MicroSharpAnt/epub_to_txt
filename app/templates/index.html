<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>电子书转文本</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/styles.css') }}" />
  </head>
  <body>
    <main class="shell">
      <section class="panel">
        <div class="heading">
          <p class="eyebrow">本地网页转换工具</p>
          <h1>电子书转文本</h1>
        </div>

        <form class="upload" action="/convert" method="post" enctype="multipart/form-data">
          <label class="file-picker">
            <span class="file-button">选择电子书文件</span>
            <span class="file-name" data-file-name>尚未选择文件</span>
            <input
              class="native-file-input"
              type="file"
              name="file"
              accept=".epub,application/epub+zip"
              aria-label="选择电子书文件"
              required
            />
          </label>
          <button type="submit">转换</button>
        </form>

        {% if error %}
          <p class="alert" role="alert">{{ error }}</p>
        {% endif %}

        {% if text %}
          <section class="result" aria-label="转换结果">
            <div class="result-bar">
              <div>
                <p class="label">输出文件</p>
                <h2>{{ output_filename }}</h2>
              </div>
              <form action="/download" method="post">
                <input type="hidden" name="filename" value="{{ output_filename }}" />
                <textarea name="text" class="hidden-text">{{ text }}</textarea>
                <button type="submit">下载文本文件</button>
              </form>
            </div>
            <textarea class="preview" readonly>{{ text }}</textarea>
          </section>
        {% endif %}
      </section>
    </main>
    <script>
      const fileInput = document.querySelector(".native-file-input");
      const fileName = document.querySelector("[data-file-name]");

      fileInput?.addEventListener("change", () => {
        fileName.textContent = fileInput.files?.[0]?.name || "尚未选择文件";
      });
    </script>
  </body>
</html>
